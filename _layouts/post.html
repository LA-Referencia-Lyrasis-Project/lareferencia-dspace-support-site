---
layout: default
---

<article id="post" class="post-page">
  <header class="post-hero">
    <p class="post-hero-chip">
      {% if page.language == "es" %}
        Sección de soporte
      {% elsif page.language == "pt" %}
        Seção de suporte
      {% else %}
        Support section
      {% endif %}
    </p>
    <h1 class="post-title post-main-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-hero-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
