<header class="site-header">
  <div class="wrapper">
    <a class="site-title nav-item"
      href="{% if page.language == 'pt' %}{{ '/pt/home' | relative_url }}{% else %}{{ '/es/home' | relative_url }}{% endif %}">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="LA Referencia - Lyrasis"
        style="height: 60px; width: auto; max-width: 600px;">
    </a>

    <button class="menu-toggle" aria-label="Toggle menu">
      <span class="hamburger"></span>
      <span class="hamburger"></span>
      <span class="hamburger"></span>
    </button>

    <nav class="site-nav">
      {% include navigation.html %}
    </nav>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const menuToggle = document.querySelector('.menu-toggle');
    const siteNav = document.querySelector('.site-nav');

    if (menuToggle && siteNav) {
      menuToggle.addEventListener('click', function () {
        siteNav.classList.toggle('nav-open');
        menuToggle.classList.toggle('active');
      });
    }

    const navLinks = document.querySelectorAll('.page-link');
    navLinks.forEach(link => {
      link.addEventListener('click', function () {
        if (window.innerWidth <= 768) {
          siteNav.classList.remove('nav-open');
          menuToggle.classList.remove('active');
        }
      });
    });
  });
</script>
